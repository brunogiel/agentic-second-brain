name: Sync check

on:
  push:
    paths:
      - 'kit/skills/**'
      - 'commands/**'
      - 'scripts/sync.py'
  pull_request:
    paths:
      - 'kit/skills/**'
      - 'commands/**'
      - 'scripts/sync.py'

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check commands are in sync with kit skills
        run: python3 scripts/sync.py --check
